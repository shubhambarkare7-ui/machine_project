{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        My Website
        {% endblock %}
    </title>

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>
<body>

    <!-- HEADER -->
    {% include 'include/header.html' %}

    <!-- PAGE CONTENT -->
    <div class="container">

        {% block content %}
        {% endblock %}

    </div>

    <!-- FOOTER -->
    {% include 'include/footer.html' %}

    <!-- JS -->
    <script src="{% static 'js/script.js' %}"></script>

</body>
</html>
